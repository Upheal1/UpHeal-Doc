project:
  type: book
  output-dir: output

book:
  title: "UpHeal: An AI-Powered, Data-Driven and Gamified Mental Health Companion"
  author:
    - name: "Hozaifa Moustafa"
    - name: "Ahmed Osama"
    - name: "Devide Hany"
    - name: "Malak Yasser"
    - name: "Abdalrahman Osama"
    - name: "Yahya Amr"
    - name: "Ahmed Zakaria"
  date: "June 2026"
  chapters:
    - index.qmd
    - acknowledgements.qmd
    - chapters/01-introduction.qmd
    - chapters/02-background.qmd
    - chapters/03-methodology.qmd
    - chapters/04-results-discussions.qmd
    - chapters/05-conclusions.qmd
  appendices:
    - chapters/appendix.qmd

bibliography: references.bib
csl: styles/ieee.csl

format:
  pdf:
    documentclass: report
    classoption: [12pt, a4paper, openany]
    toc: true
    toc-depth: 3
    number-sections: true
    lof: false
    lot: false
    include-in-header:
      text: |
        % === FONT CONFIGURATION ===
        \usepackage{fontspec}
        \setmainfont{Times New Roman}

        % === SPACING ===
        \usepackage{setspace}
        \singlespacing

        % === MARGINS (tight to reduce page count) ===
        \usepackage[a4paper, top=0.9in, bottom=0.9in, left=0.65in, right=0.65in]{geometry}

        % === HEADING FORMAT ===
        \usepackage{titlesec}
        % Chapters: 16pt Bold
        \titleformat{\chapter}[display]
          {\normalfont\fontsize{16}{19}\bfseries}
          {\chaptertitlename\ \thechapter}{10pt}{}
        % Sections: 14pt Bold
        \titleformat{\section}
          {\normalfont\fontsize{14}{17}\bfseries}
          {\thesection}{1em}{}
        % Subsections: 14pt Underlined
        \titleformat{\subsection}
          {\normalfont\fontsize{14}{17}}
          {\thesubsection}{1em}{\underline}

        % === PAGE NUMBERING (all pages except cover) ===
        \usepackage{fancyhdr}
        \pagestyle{fancy}
        \fancyhf{}
        \fancyhead[R]{\thepage}
        \renewcommand{\headrulewidth}{0pt}
        \fancypagestyle{plain}{
          \fancyhf{}
          \fancyhead[R]{\thepage}
          \renewcommand{\headrulewidth}{0pt}
        }

        % === PARAGRAPH SPACING ===
        \setlength{\parskip}{0pt plus 1pt}
        \setlength{\parindent}{12pt}

        % === TIGHT LISTS ===
        \usepackage{enumitem}
        \setlist{nosep}

        % === DISABLE DEFAULT TITLE PAGE (we provide custom cover pages) ===
        \let\maketitle\relax

        % === SCALE ALL FIGURES TO FIT TEXT WIDTH WITHOUT CLIPPING ===
        \setkeys{Gin}{width=0.95\linewidth,keepaspectratio}
    include-before-body:
      text: |
        % Outer cover: Title + University Logo + Academic Year only
        \thispagestyle{empty}
        \begin{titlepage}
          \centering
          \vspace*{2cm}
          {\fontsize{18}{22}\selectfont\textbf{UpHeal: An AI-Powered, Data-Driven and Gamified Mental Health Companion}\par}
          \vspace{2cm}
          % University logo placeholder - replace logo-filename.pdf with actual file
          % \includegraphics[width=4cm]{images/university-logo.pdf}\par
          \vspace{0.5cm}
          {\Large Pharos University in Alexandria}\par
          \vfill
          {\large Academic Year 2025--2026}\par
        \end{titlepage}

        % Inner title page: full metadata
        \thispagestyle{empty}
        \begin{titlepage}
          \centering
          \vspace*{2cm}
          {\fontsize{18}{22}\selectfont\textbf{UpHeal: An AI-Powered, Data-Driven and Gamified Mental Health Companion}\par}
          \vspace{1.5cm}
          {\large Graduation Project Thesis}\par
          \vspace{1cm}
          {\large Submitted to the Department of Computer Science \& AI}\par
          {\large Faculty of Computer Science \& Artificial Intelligence}\par
          {\large Pharos University in Alexandria}\par
          \vspace{1.5cm}
          {\large By}\par
          \vspace{0.5cm}
          {\normalsize
          Hozaifa Moustafa, Ahmed Osama, Devide Hany, Malak Yasser,\\
          Abdalrahman Osama, Yahya Amr, Ahmed Zakaria\par}
          \vspace{1cm}
          {\large Supervisor: Dr. Sahar Ghanem}\par
          \vfill
          {\large June 2026}\par
        \end{titlepage}
    pdf-engine: xelatex
    keep-tex: true
  docx:
    toc: true
    number-sections: true
    toc-depth: 3

execute:
  freeze: auto

editor_options:
  chunk_output_type: console